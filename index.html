
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan Jamur</title>
<meta name="theme-color" content="#4CAF50">
<style>
* { box-sizing: border-box; font-family: Arial, sans-serif; }
body { background: #f5f5f5; padding: 15px; margin: 0; }
.container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
h1 { color: #4CAF50; text-align: center; margin-top: 0; }
input, button, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
button { background: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; }
button:hover { background: #45a049; }
.tabs { display: flex; gap: 5px; margin-bottom: 15px; }
.tabs button { flex: 1; background: #eee; color: #333; }
.tabs button.active { background: #4CAF50; color: white; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 14px; }
th { background: #4CAF50; color: white; }
.info { background: #e8f5e9; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
<h1>🍄 Laporan Jamur</h1>

<div class="info">
Buka menu Chrome > <b>Install app</b> biar jadi aplikasi di HP kamu
</div>

<div class="tabs">
<button class="active" onclick="showTab('harian')">Input Harian</button>
<button onclick="showTab('bulanan')">Laporan Bulanan</button>
<button onclick="showTab('tahunan')">Laporan Tahunan</button>
</div>

<div id="harian">
<input type="date" id="tanggal">
<input type="number" id="jamur" placeholder="Jamur (kg)">
<input type="number" id="pendapatan" placeholder="Pendapatan">
<input type="number" id="operasional" placeholder="Biaya Operasional">
<input type="text" id="keterangan" placeholder="Keterangan">
<button onclick="simpan()">Simpan Hari Ini</button>
<button onclick="resetHari()" style="background:#f44336;">Reset Hari Ini</button>
</div>

<div id="bulanan" style="display:none;">
<p>Data bulan ini akan muncul di sini</p>
</div>

<div id="tahunan" style="display:none;">
<p>Data tahunan akan muncul di sini</p>
</div>
</div>

<script>
document.getElementById('tanggal').valueAsDate = new Date();

function showTab(tab) {
document.getElementById('harian').style.display = tab === 'harian' ? 'block' : 'none';
document.getElementById('bulanan').style.display = tab === 'bulanan' ? 'block' : 'none';
document.getElementById('tahunan').style.display = tab === 'tahunan' ? 'block' : 'none';
}

function simpan() {
let data = {
tanggal: document.getElementById('tanggal').value,
jamur: document.getElementById('jamur').value,
pendapatan: document.getElementById('pendapatan').value,
operasional: document.getElementById('operasional').value,
keterangan: document.getElementById('keterangan').value
};
localStorage.setItem('laporan_' + data.tanggal, JSON.stringify(data));
alert('Data tersimpan!');
}

function resetHari() {
if(confirm('Hapus data hari ini?')) {
localStorage.removeItem('laporan_' + document.getElementById('tanggal').value);
alert('Data direset!');
}
}
</script>
</body>
</html>
